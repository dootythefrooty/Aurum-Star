- type: entity
  parent: ClothingBeltBase
  id: ClothingBeltBaseCloneProjector
  abstract: true
  components:
  - type: Sprite
    sprite: _Goobstation/Clothing/Belt/geminiprojector.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/Belt/geminiprojector.rsi
    equipDelay: 10
    unequipDelay: 15 # Unscrewing something from your nervous system is kinda difficult.
    stripDelay: 20 # Even harder when its someone else. Don't paralyze em!
  - type: Item
    sprite: _Goobstation/Clothing/Belt/geminiprojector.rsi
    size: Large
  - type: CloneProjector
    userBlacklist:
      components:
      - Zombie
    restrictRangedWeapons: false # Aurum - You kinda need to be able to shoot in a shipfork...
    damageOnDestroyed:
      groups:
        Brute: 10
    addedComponents:
    - type: GhostTakeoverAvailable
    - type: AntagImmune
    - type: MovementIgnoreGravity
    # - type: SpecialPressureImmunity # Aurum - Doesn't work
    - type: PressureImmunity # Aurum - So, we do this.
    - type: RequireProjectileTarget
    - type: NoSlip
    - type: ZombieImmune
    # - type: CrematoriumImmune # Aurum - Doesn't work
    - type: BreathingImmunity
    - type: TemperatureImmunity
    - type: TypingIndicator
      proto: robot
    - type: Speech
      speechVerb: Robotic
      speechSounds: Borg
    - type: Silicon
      entityType: enum.SiliconType.Player
      batteryPowered: false
      chargeThresholdMid: null
      chargeThresholdLow: null
      chargeThresholdCritical: null
      speedModifierThresholds:
        4: 1
        3: 1
        2: 0.80
        1: 0.45
        0: 0.00
    - type: Vocal
      sounds:
        Unsexed: UnisexSilicon
    - type: UnblockableSpeech
    - type: ProtectedFromStepTriggers
    - type: MobState
      allowedStates:
      - Alive
      - Dead
    - type: MobThresholds
      thresholds:
        0: Alive
        100: Dead # The Answer to the Ultimate Question of Life, the Universe, and Everything # Aurum Change: 42 to 100
    - type: Damageable
      damageContainer: Silicon # Aurum - SiliconRadiation to Silicon
    - type: StatusEffects
      allowed:
      - Stun
      - KnockedDown
      - SlowedDown
      - Pacified
      - Flashed
    - type: Uncloneable
    - type: Tag
      tags:
      - CanPilot
      - DoorBumpOpener
      - Unimplantable
    removedComponents:
    - type: Destructible
    - type: SurgeryTarget
    - type: Deathgasp
    - type: Polymorphable
    - type: HealthExaminable
      examinableTypes:
      - Shock
    - type: Temperature
    - type: AtmosExposed
    - type: MovedByPressure
    - type: ThermalRegulator
    - type: SSDIndicator
    # Aurum Change
    # - type: Condemned # Disgusting silicon. # Aurum - Devils aren't real - Aurum Change
    #  soulOwnedNotDevil: true - Aurum Change
    - type: Flammable
      damage:
        types:
          burn: 0 # required for whatever reason, go fuck yourself
    - type: FireVisuals
    - type: Respirator
      damage:
        types:
          Asphyxiation: 0 # required for whatever reason, go fuck yourself
      damageRecovery:
        types:
          Asphyxiation: 0 # required for whatever reason, go fuck yourself
    - type: Internals
    - type: Bloodstream
      bloodlossDamage:
        types:
          Bloodloss:
            0
      bloodlossHealDamage:
        types:
          Bloodloss:
            0
    - type: InjectableSolution
    - type: SolutionContainerManager
    - type: Dna
    # - type: Absorbable # Aurum - Lings Ain't Real
    - type: Fingerprint
    - type: Perishable
    - type: Hunger
    - type: Thirst
    # - type: FootprintOwner # Aurum - Print's Ain't Real
    - type: ItemSlots # No infinite batteries.
    - type: BlockInjection # Aurum - Gemini fixes
    - type: Blindable # Aurum - Gemini fixes
    - type: CanEnterCryostorage # Aurum - Gemini fixes
    - type: CanHostGuardian # Aurum - Gemini fixes
    - type: FlashImmunity # Aurum - Gemini fixes

- type: entity
  parent: ClothingBeltBaseCloneProjector
  id: ClothingBeltGeminiHoloProjector
  name: ax-32 "gemini" holo-projector rig
  description: A highly advanced holo-projector rig that interfaces directly with the users spinal cord to generate an exact copy of them. Truly a marvel of Nanotrasen technology.
  components:
  - type: Sprite
    sprite: _Goobstation/Clothing/Belt/geminiprojector.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/Belt/geminiprojector.rsi
#  - type: StealTarget # Aurum - Nuh Uh Uh
#    stealGroup: ClothingBeltGeminiHoloProjector
  - type: CloneProjector
    clonedItemBlacklist:
      components:
      - CloneProjector
    clonedItemWhitelist:
      components:
      - Clothing
    # Aurum - Removed removedCompoments and moved them all to parent.
    #removedComponents:
    #- type: CanHostGuardian
    #userBlacklist:
    #  components:
    #  - Zombie
  - type: Tag
    tags:
      - HighRiskItem
      - ClothingBeltGeminiHoloProjector

