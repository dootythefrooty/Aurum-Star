- type: entity
  parent: [ClothingUniformBase]
  id: ClothingUniformJumpsuitNavyGold
  name: navy officer's jumpsuit
  description: A suit worn by high-ranking Central Command members. The rest is classified.
  components:
  - type: Sprite
    sprite: _Goobstation/Clothing/Uniforms/Jumpsuit/navy_gold.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/Uniforms/Jumpsuit/navy_gold.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.75
        Slash: 0.75
        Piercing: 0.70
        Heat: 0.75

