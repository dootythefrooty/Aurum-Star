    sprite: _Goobstation/Clothing/Uniforms/Jumpsuit/centcomsuit_liaison.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/Uniforms/Jumpsuit/centcomsuit_liaison.rsi
  # Aurum change - CentComm shit is valuable now
  - type: StaticPrice
    price: 1200


