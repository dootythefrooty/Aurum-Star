  description: Maybe you are missing the tie and the white shirt to be a true detective, or maybe you're just one of those people that want to look like they are with the police.
  components:
  - type: Sprite
    sprite: _Aurum/Clothing/OuterClothing/Coats/browndetective_trenchcoat.rsi
  - type: Clothing
    sprite: _Aurum/Clothing/OuterClothing/Coats/browndetective_trenchcoat.rsi

- type: entity
  parent: [ClothingOuterStorageFoldableBaseOpened, ClothingOuterCoatBrownDetectiveTrenchcoat]
  id: ClothingOuterCoatBrownDetectiveTrenchcoatOPEN

- type: entity
  parent: [ClothingOuterStorageFoldableBase, ClothingOuterCoatDetective]
