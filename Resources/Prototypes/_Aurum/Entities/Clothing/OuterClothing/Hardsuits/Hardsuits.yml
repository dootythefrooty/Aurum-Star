- type: entity
  parent: ClothingOuterHardsuitBase
  id: ClothingOuterHardsuitOneStarUnitEngineering
  name: OS-001E "Sequence"
  description: Nicknamed "Sequence", a now outdated product made by the same company that mass produced the One Star units, these hardsuits were used by engineers that were deployed alongside officers and the main unit itself, mostly to take care of the unit's maintenance.
  components:
  - type: Sprite
    sprite: _Aurum/Clothing/OuterClothing/Hardsuits/one_star_hardsuit.rsi
  - type: Clothing
    sprite: _Aurum/Clothing/OuterClothing/Hardsuits/one_star_hardsuit.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.4
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
        Heat: 0.65
        Radiation: 0.5
        Caustic: 0.5
        Shock: 0.0
  - type: ClothingSpeedModifier
    walkModifier: 0.95
    sprintModifier: 0.95
  - type: HeldSpeedModifier
  - type: ToggleableClothing # Goobstation - Modsuits change - Mono - this is a solution for helmet attachment/cover to not fit on hardsuits
    requiredSlot: outerclothing
    blockUnequipWhenAttached: false
    replaceCurrentClothing: true
    clothingPrototypes:
      head: ClothingHelmetHardsuitOneStarUnitEngineering
      helmetcover: ClothingHeadHelmetCoverBlock
      helmetattachment: ClothingHeadHelmetAttachmentBlock
  - type: StaminaDamageResistance
    coefficient: 0.6
