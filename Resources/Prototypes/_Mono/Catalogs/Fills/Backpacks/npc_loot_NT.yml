#NT security lootbox
- type: entity
  parent: RogueSiliconGiftBox
  name: NT Security equipement crate
  id: ClothingBackpackRogueNanotrasenT1
  description: A Nanotrasen security forces gear crate, has a couple scratches, paint's dry. One must wonder how this ever got to your hands. # Aurum - Lore Slop
  suffix: NPC Loot, T1
  # categories: [ HideSpawnMenu ] #Mono: spawnable for easier testing, why tf wasnt it spawnable anyway
  components:
  - type: Sprite
    state: NTsec-base
  - type: SpawnItemsOnUse
    items:
    #Weapons/ammo/gears
    - id: WeaponPistolMk58
      prob: 0.3 # Aurum -> 0.6 to 0.3 - This item appears every single time.
    - id: Magazine45_ACPPistolHighCapacityFMJ
      prob: 0.2
      amount: 2
    - id: Magazine45_ACPPistolFMJ
      prob: 0.6
      amount: 2
    - id: WeaponSubMachineGunVectorNtsfHclm
      prob: 0.2
    - id: Magazine45_magnumPistolHighCapacityFMJ
      prob: 0.2
      amount: 2
    - id: WeaponRifleNtsfLtr
      prob: 0.1 # Aurum -> 0.05 to 0.1
    - id: Magazine556x45mmPlasteelAP
      prob: 0.05
      amount: 2
    - id: AmmoBox556x45mmPlasteelAP
      prob: 0.05
    - id: Magazine556x45mmFMJ
      prob: 0.1
      amount: 2
    - id: AmmoBox556x45mmFMJ
      prob: 0.1
    - id: MedkitCombatFilled
      prob: 0.05
    - id: MedkitFilled
      prob: 0.5
    #Clothings
    - id: ClothingOuterVestWeb
      prob: 0.05
    - id: ClothingHeadHelmetSwat
      prob: 0.05
    - id: NTLootT1Clothing
      amount: 1
      prob: 0.8
    - id: NTLootT1Clothing
      amount: 2
      prob: 0.1
    - id: NTLootT1Clothing
      amount: 3
      prob: 0.04
    #NT branded bullshit
    - id: TowelColorNT
      prob: 0.2 # Aurum -> 0.33 to 0.2
    - id: BalloonNT
      prob: 0.2 # Aurum -> 0.33 to 0.2
    - id: NTHandyFlag
      prob: 0.2 # Aurum -> 0.33 to 0.2
    #Blueprint
    - id: BlueprintWeaponSubMachineGunVectorNtsfHclm
      prob: 0.1 # Aurum -> 0.08 to 0.1
    - id: WeaponRifleNtsfLtr
      prob: 0.1 # Aurum -> 0.08 to 0.1
    sound:
      path: /Audio/Machines/windoor_open.ogg

